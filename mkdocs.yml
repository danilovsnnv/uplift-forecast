site_name: uplift-forecast
site_description: Uplift modelling library — neural, meta-learner, and matching models for causal treatment-effect estimation under one unified API.
repo_url: https://github.com/danilovsnnv/uplift-forecast
repo_name: danilovsnnv/uplift-forecast

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
  palette:
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_root_heading: true
            show_source: false
            show_signature_annotations: true
            members_order: source
            separate_signature: true
            heading_level: 2

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Tutorials:
      - Targeting under a budget with PolicyForest: tutorials/targeting-under-a-budget.md
  - API reference:
      - Models: api/models.md
      - Matching: api/matching.md
      - Metrics: api/metrics.md
      - Auto (hyperparameter search): api/auto.md
      - Frameworks: api/frameworks.md
